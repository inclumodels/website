<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}IncluhubPredict{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
</head>
<body>
<div id="wrapper">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="brand">
      <img src="/static/logo.svg" class="brand-logo" alt="IncluhubPredict" />
      <div class="brand-tagline">Predict · Assess · Place</div>
    </div>

    <div class="nav-section-label">Navigation</div>
    <ul class="nav-list">
      <li>
        <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
          <i class="bi bi-grid-1x2"></i>Dashboard
        </a>
      </li>
      <li>
        <a class="nav-link {% if '/submit' in request.url.path %}active{% endif %}" href="/submit">
          <i class="bi bi-person-plus"></i>New Submission
        </a>
      </li>
      <li>
        <a class="nav-link {% if '/batch' in request.url.path %}active{% endif %}" href="/batch">
          <i class="bi bi-layers"></i>Batch Upload
        </a>
      </li>
    </ul>

    <div class="sidebar-network">
      <img src="/static/network-logo.svg" class="network-icon" alt="Network" />
      <span class="network-label">Global Talent Network</span>
    </div>

    <div class="sidebar-footer">
      IncluhubPredict v1.0<br />
      For A Better Creators Economy
    </div>
  </nav>

  <!-- Content -->
  <div id="page-content">
    <header class="topbar">
      <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
      <div class="topbar-badge">Internal Portal</div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
