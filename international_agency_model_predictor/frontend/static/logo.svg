<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80">
  <!-- Glow background -->
  <defs>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background circle -->
  <circle cx="40" cy="40" r="34" fill="rgba(201,169,110,0.07)" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="40" cy="40" r="34" fill="url(#nodeGlow)"/>

  <!-- Neural network connections -->
  <line x1="40" y1="16" x2="20" y2="36" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.30"/>
  <line x1="40" y1="16" x2="60" y2="36" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.30"/>
  <line x1="20" y1="36" x2="28" y2="56" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.30"/>
  <line x1="60" y1="36" x2="52" y2="56" stroke="#C9A96E" stroke-width="1" stroke-opacity="0.30"/>
  <line x1="20" y1="36" x2="60" y2="36" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="28" y1="56" x2="52" y2="56" stroke="#C9A96E" stroke-width="0.8" stroke-opacity="0.18"/>
  <line x1="40" y1="16" x2="28" y2="56" stroke="#C9A96E" stroke-width="0.6" stroke-opacity="0.12"/>
  <line x1="40" y1="16" x2="52" y2="56" stroke="#C9A96E" stroke-width="0.6" stroke-opacity="0.12"/>

  <!-- Neural network nodes -->
  <circle cx="40" cy="16" r="4.5" fill="#C9A96E" filter="url(#glow)"/>
  <circle cx="20" cy="36" r="3.5" fill="#C9A96E" opacity="0.75"/>
  <circle cx="60" cy="36" r="3.5" fill="#C9A96E" opacity="0.75"/>
  <circle cx="28" cy="56" r="3"   fill="#C9A96E" opacity="0.60"/>
  <circle cx="52" cy="56" r="3"   fill="#C9A96E" opacity="0.60"/>
  <!-- Centre node -->
  <circle cx="40" cy="38" r="5.5" fill="rgba(201,169,110,0.15)" stroke="#C9A96E" stroke-width="1.2"/>
  <circle cx="40" cy="38" r="2.5" fill="#C9A96E"/>

  <!-- Brand text -->
  <text x="88" y="34"
        font-family="Outfit, Inter, sans-serif"
        font-size="19"
        font-weight="800"
        fill="#EDD9A3"
        letter-spacing="1.5">INCLUHUB</text>
  <text x="89" y="54"
        font-family="Outfit, Inter, sans-serif"
        font-size="13"
        font-weight="500"
        fill="#C9A96E"
        letter-spacing="5">PREDICT</text>

  <!-- Accent line between words -->
  <line x1="88" y1="40" x2="220" y2="40" stroke="#C9A96E" stroke-width="0.6" stroke-opacity="0.35"/>
</svg>
